<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mega Jefe: Jogo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #222;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      width: 90%;
      max-width: 800px;
      text-align: center;
      padding: 2%;
      background-color: rgba(0, 0, 0, 0.7);
      border-radius: 5px;
      box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.3);
    }

    .option {
      margin: 10px;
      padding: 10px 20px;
      font-size: 18px;
      background-color: #3498db;
      color: #fff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: background-color 0.3s ease, transform 0.2s;
    }

    .option:hover {
      background-color: #2980b9;
      transform: translateY(-3px);
    }

    .health-bar-container {
      width: 100%;
      height: 20px;
      background-color: #444;
      border-radius: 10px;
      overflow: hidden;
      margin: 10px 0;
    }

    .health-bar {
      height: 100%;
      background-color: #f44336;
      border-radius: 10px;
      transition: width 0.3s ease;
    }

    .character-image, .boss-image {
      width: 170px;
      height: auto;
      margin: 10px;
    }

    .special-message {
      font-size: 36px;
      font-weight: bold;
      animation: pulse 2s infinite alternate;
      text-transform: uppercase;
      color: #ff0000;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      100% { transform: scale(1.1); color: #f00; }
    }

    #specialAbilityButton {
      background-color: #f4067d;
      color: #fff;
    }

    #specialAbilityMessage {
      position: absolute;
      top: 0;
      right: 0;
      background: url('https://i.pinimg.com/originals/0a/0e/68/0a0e687ae35c4464fb52919de028cc39.gif') no-repeat center center;
      background-size: cover;
      width: 200px;
      height: 100%;
      text-align: center;
      padding: 20px;
      color: white;
      font-weight: bold;
      display: none;
    }

    .special-bar {
      width: 0;
      height: 10px;
      background-color: #e8e001;
      transition: width 1s;
      position: relative;
    }

    .special-bar::before {
      content: "⚡";
      position: absolute;
      top: 50%;
      left: 10px;
      transform: translateY(-50%);
      font-size: 14px;
      color: yellow;
    }

    .special-bar.titilar::before {
      animation: titilar 1s infinite alternate;
    }

    @keyframes titilar {
      0% { opacity: 1; }
      100% { opacity: 0; }
    }

    #logContainer {
      background-color: #181818;
      padding: 10px;
      border-radius: 5px;
      text-align: left;
      height: 80px;
      margin-top: 20px;
      overflow-y: auto;
    }

    .yellowShadow {
      animation: yellowShadow 1s infinite;
    }

    @keyframes yellowShadow {
      0% { box-shadow: 0 0 10px yellow; }
      50% { box-shadow: 0 0 20px rgb(222, 222, 6); }
      100% { box-shadow: 0 0 10px yellow; }
    }

    .greenShadow {
      animation: greenShadow 1s infinite;
    }

    @keyframes greenShadow {
      0% { box-shadow: 0 0 10px green; }
      50% { box-shadow: 0 0 20px rgb(0, 255, 0); }
      100% { box-shadow: 0 0 10px green; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="pasivas" class="passive-skills"></div>
    <img class="character-image" src="" alt="Jugador">
    <div class="character-stats">
      <div class="health-bar-container">
        <div class="health-bar user-health"></div>
      </div>
      <div id="tesla-special-bar" class="special-bar"></div>
    </div>
    <img class="boss-image" src="https://i0.wp.com/codigoespagueti.com/wp-content/uploads/2023/09/jogo-quien-es-jujutsu-kaisen.jpg?resize=1280%2C670&quality=80&ssl=1" alt="Jefe" id="bossImage">
    <div class="character-stats">
      <div class="health-bar-container">
        <div class="health-bar boss-health"></div>
      </div>
    </div>
    <div id="message" class="alert alert-info mt-3">¡Es hora de pelear!</div>
    <div id="logContainer">
      <div class="damage-log" id="damageLog"></div>
    </div>
    <div id="options" class="mt-3">
      <button class="option btn btn-primary" onclick="attack()">Atacar</button>
      <button class="option btn btn-secondary" onclick="defend()">Defenderse</button>
      <button id="specialAbilityButton" class="btn btn-danger" onclick="useSpecialAbility()">Usar Habilidad Especial</button>
      <button id="helpButton" class="btn btn-success" onclick="askForHelp()">Tecnica de Maldicion Inversa</button>
    </div>
    <div id="specialAbilityMessage" class="message"></div>
    <a id="backButton" class="btn mt-3" href="seleccion.html">Volver</a>

  </div>
  
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="megajefe.js"></script>
</body>
</html>
